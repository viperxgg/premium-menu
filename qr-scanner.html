<!DOCTYPE html>
<html>
<head>
    <title>QR Code Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #canvas { border: 15px solid white; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .info { margin-top: 20px; text-align: center; color: #D4AF37; letter-spacing: 2px; text-transform: uppercase; font-size: 14px; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">Scan to Open Menu</div>
    <script>
        // Redirect to index.html for local testing or change to a live URL
        const url = window.location.href.replace('qr-scanner.html', 'index.html');
        QRCode.toCanvas(document.getElementById('canvas'), url, {
            width: 300,
            margin: 2,
            color: {
                dark: '#000000',
                light: '#ffffff'
            }
        });
    </script>
</body>
</html>
